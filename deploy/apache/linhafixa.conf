# Apache 2 virtual host for Linha Fixa.
#
# In production the app runs as a Node process (`npm start` -> node dist/server.cjs)
# on port 3000. That Express server already serves the built SPA from dist/, the
# /api/* endpoints, AND the client-side routing fallback (app.get('*') -> index.html).
# So Apache only needs to be a reverse proxy in front of it — no SPA RewriteRule
# is required here.
#
# HTTPS is mandatory: the eye-tracking screen uses getUserMedia (camera), which
# browsers only allow in a secure context. Plain http:// will block the camera
# on iPhone/Safari.
#
# Required modules (enable once):
#   sudo a2enmod proxy proxy_http ssl headers rewrite
#
# Replace the placeholders below:
#   <DOMAIN>            e.g. linhafixa.seudominio.com
#   <SSL_CERT_FILE>     e.g. /etc/letsencrypt/live/<DOMAIN>/fullchain.pem
#   <SSL_KEY_FILE>      e.g. /etc/letsencrypt/live/<DOMAIN>/privkey.pem

# --- HTTP: redirect everything to HTTPS ---------------------------------------
<VirtualHost *:80>
    ServerName <DOMAIN>

    # Let certbot's HTTP-01 challenge through, redirect the rest to HTTPS.
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
</VirtualHost>

# --- HTTPS: reverse proxy to the Node app -------------------------------------
<VirtualHost *:443>
    ServerName <DOMAIN>

    SSLEngine on
    SSLCertificateFile      <SSL_CERT_FILE>
    SSLCertificateKeyFile   <SSL_KEY_FILE>

    # Proxy all traffic (SPA, static assets and /api) to the Node server.
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    # Forward the original protocol/host so the app knows it is behind HTTPS.
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    # Allow the camera for this origin (front-facing webcam diagnostics).
    Header always set Permissions-Policy "camera=(self), microphone=()"

    # Reasonable security headers (adjust to taste).
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/linhafixa-error.log
    CustomLog ${APACHE_LOG_DIR}/linhafixa-access.log combined
</VirtualHost>
