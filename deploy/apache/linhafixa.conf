# Apache 2 config for Linha Fixa.
#
# In production the app runs as a Node process (`npm start` -> node dist/server.cjs)
# on port 3000. That Express server already serves the built SPA from dist/, the
# /api/* endpoints AND the client-side routing fallback (app.get('*') -> index.html).
# So Apache only needs to be a reverse proxy in front of it.
#
# HTTPS is mandatory: the eye-tracking screen uses getUserMedia (camera), which
# browsers only allow in a secure context. Plain http:// blocks the camera on
# iPhone/Safari.
#
# Required modules (enable once):
#   sudo a2enmod proxy proxy_http ssl headers rewrite
#
# ──────────────────────────────────────────────────────────────────────────────
# TARGET (intended): https://ultrassom.ai/gaze
# ──────────────────────────────────────────────────────────────────────────────
# ultrassom.ai is an existing domain, so Linha Fixa is mounted under the /gaze
# PATH PREFIX rather than its own vhost. Drop the <Location "/gaze"> block below
# into the existing ultrassom.ai :443 SSL vhost.
#
# ⚠️ Serving under a sub-path is handled app-side by the APP_BASE_PATH env (see
# deploy/apache/README.md "Servir sob /gaze"). Set APP_BASE_PATH=/gaze for BOTH the
# build and the Node runtime; the prefix is then preserved end-to-end (Apache -> Node
# both see /gaze/...). No SPA RewriteRule is needed here.

# Paste this inside <VirtualHost *:443> ServerName ultrassom.ai ... </VirtualHost>:
<Location "/gaze">
    ProxyPreserveHost On
    ProxyPass        http://127.0.0.1:3000/gaze
    ProxyPassReverse http://127.0.0.1:3000/gaze

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "443"

    # Allow the front-facing camera for the diagnostics screen on this origin.
    Header always set Permissions-Policy "camera=(self), microphone=()"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
</Location>

# ──────────────────────────────────────────────────────────────────────────────
# Reference: standalone vhost (root mount) — useful for a staging subdomain such
# as https://gaze.ultrassom.ai. With its own host the app can stay mounted at /
# (no app-side base-path changes needed). Replace the cert paths.
# ──────────────────────────────────────────────────────────────────────────────
#
# <VirtualHost *:80>
#     ServerName gaze.ultrassom.ai
#     RewriteEngine On
#     RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
#     RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]
# </VirtualHost>
#
# <VirtualHost *:443>
#     ServerName gaze.ultrassom.ai
#     SSLEngine on
#     SSLCertificateFile    /etc/letsencrypt/live/gaze.ultrassom.ai/fullchain.pem
#     SSLCertificateKeyFile /etc/letsencrypt/live/gaze.ultrassom.ai/privkey.pem
#     ProxyPreserveHost On
#     ProxyPass        / http://127.0.0.1:3000/
#     ProxyPassReverse / http://127.0.0.1:3000/
#     RequestHeader set X-Forwarded-Proto "https"
#     Header always set Permissions-Policy "camera=(self), microphone=()"
#     ErrorLog  ${APACHE_LOG_DIR}/linhafixa-error.log
#     CustomLog ${APACHE_LOG_DIR}/linhafixa-access.log combined
# </VirtualHost>
